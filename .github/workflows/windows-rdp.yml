name: Free Windows RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # 1. تحميل وتثبيت تايل سكيل يدوياً للويندوز
      - name: Download and Install Tailscale
        shell: powershell
        run: |
          Write-Host "جاري تحميل وتثبيت Tailscale..."
          Invoke-WebRequest -Uri https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
          Start-Process -FilePath .\tailscale-setup.exe -ArgumentList "/qn" -Wait
          Write-Host "تم التثبيت بنجاح!"

      # 2. الربط بالشبكة مباشرة عبر سطر الأوامر للويندوز
      - name: Connect to Tailscale Network
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host "جاري الاتصال بشبكة تايل سكيل..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --accept-routes
          Write-Host "تم الاتصال بالشبكة بنجاح!"

      # 3. إعداد الـ RDP والمستخدم
      - name: Enable RDP and Setup User
        shell: powershell
        run: |
          Write-Host "جاري تفعيل الـ RDP وفتح جدار الحماية..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $Password = ConvertTo-SecureString "GitHubRDP@2026" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          Write-Host "=========================================="
          Write-Host "تم التجهيز! بيانات الدخول هي:"
          Write-Host "Username: runneradmin"
          Write-Host "Password: GitHubRDP@2026"
          Write-Host "=========================================="

      # 4. الحفاظ على تشغيل السيرفر
      - name: Keep Alive Loop
        shell: powershell
        run: |
          Write-Host "الجهاز مستعد الآن. يمكنك الاتصال عبر RDP باستخدام IP الجهاز من لوحة تايل سكيل."
          $hours = 6
          for ($i = 0; $i -lt ($hours * 60); $i++) {
              Start-Sleep -Seconds 60
          }
