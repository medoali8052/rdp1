name: Windows RDP with Auto-Refresh

on:
  workflow_dispatch:
  repository_dispatch:
    types: [rerun_rdp]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # الجلسة ستستمر لمدة 6 ساعات كحد أقصى

    steps:
      # 1. إعداد البيئة والتحقق من الملفات
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. تثبيت وإعداد شبكة Tailscale والربط التلقائي الصارم بالـ Key الصحيح
      - name: Connect to Tailscale
        shell: powershell
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }} # تم التعديل ليتطابق مع اسم السيكرت عندك
        run: |
          Write-Host "Installing Tailscale via Chocolatey..."
          choco install tailscale -y
          
          $env:Path += ";C:\Program Files\Tailscale"
          
          Write-Host "Connecting to Tailscale using Auth Key..."
          # تمرير المفتاح من متغير البيئة مباشرة للربط الفوري وتخطي الرابط
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TS_AUTHKEY --accept-routes
          
          Write-Host "Tailscale connected successfully!"

      # 3. إعداد ريموت ديسكتوب (RDP) داخل الويندوز للسماح بالاتصال
      - name: Configure Windows RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          Write-Host "Windows RDP configuration completed."

      # 4. تثبيت متصفح كروم وباقي الأدوات
      - name: Auto-Install My Tools & Apps
        shell: powershell
        run: |
          Write-Host "Installing Google Chrome and WinRAR..."
          choco install googlechrome -y
          choco install winrar -y

      # 5. إبقاء السيرفر حياً والانتظار (Loop)
      - name: Keep RDP Alive Loop
        shell: powershell
        run: |
          Write-Host "RDP Server is ready. You can connect via Tailscale IP."
          Write-Host "The session will auto-refresh after 6 hours..."
          
          # الانتظار لمدة 5.5 ساعات قبل بدء خطوات التدوير التلقائي
          Start-Sleep -Seconds 19800

      # 6. تشغيل الجلسة التالية تلقائياً قبل إغلاق الحالية (Trigger Next Run)
      - name: Trigger Next Run
        shell: powershell
        run: |
          $repo = "${{ github.repository }}"
          $url = "https://api.github.com/repos/$repo/dispatches"
          
          $headers = @{
              "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "Accept"        = "application/vnd.github.v3+json"
          }
          
          $body = @{
              "event_type" = "rerun_rdp"
          } | ConvertTo-Json
          
          Invoke-RestMethod -Uri $url -Method Post -Headers $headers -Body $body -ContentType "application/json"
          Write-Host "Triggered next workflow run successfully."

      # 7. حذف تاريخ الـ Run الحالي للحفاظ على نظافة الـ Repository
      - name: Auto Delete Current Workflow Run
        if: always()
        shell: powershell
        run: |
          $repo = "${{ github.repository }}"
          $run_id = "${{ github.run_id }}"
          $url = "https://api.github.com/repos/$repo/actions/runs/$run_id"
          
          $headers = @{
              "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "Accept"        = "application/vnd.github.v3+json"
          }
          
          Write-Host "Deleting workflow run $run_id to keep history clean..."
          Invoke-RestMethod -Uri $url -Method Delete -Headers $headers
          Write-Host "Current workflow run deleted."
