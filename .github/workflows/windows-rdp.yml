name: Free Windows RDP via Tailscale

on:
  workflow_dispatch:
  repository_dispatch:
    types: [rerun_rdp]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      # 1. تثبيت تايل سكيل عبر مدير حزم ويندوز المدمج (Choco)
      - name: Install Tailscale via Chocolatey
        shell: powershell
        run: |
          choco install tailscale -y

      # 2. الربط بالشبكة (تعديل لتفادي خطأ عدم التعرف على المسار)
      - name: Connect to Tailscale Network
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # إعادة تحديث مسارات النظام في الجلسة الحالية ليقرأ التثبيت الجديد
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          
          Start-Sleep -Seconds 5
          
          # محاولة التشغيل عبر المسار الافتراضي المحدث أو المباشر
          if (Test-Path "C:\Program Files\Tailscale\tailscale.exe") {
              & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --accept-routes
          } else {
              tailscale up --authkey=$env:TAILSCALE_AUTH_KEY --accept-routes
          }

      # 3. إعداد الـ RDP والمستخدم
      - name: Enable RDP and Setup User
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $Password = ConvertTo-SecureString "GitHubRDP@2026" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

      # 4. تثبيت أدواتك وبرامجك تلقائياً
      - name: Auto-Install My Tools & Apps
        shell: powershell
        run: |
          Write-Host "Installing Google Chrome and WinRAR..."
          choco install googlechrome -y
          choco install winrar -y

      # 5. الحفاظ على تشغيل السيرفر (5 ساعات و50 دقيقة)
      - name: Keep Alive Loop
        shell: powershell
        run: |
          $minutes = 350
          for ($i = 0; $i -lt $minutes; $i++) {
              Start-Sleep -Seconds 60
          }

      # 6. خطوة استدعاء التشغيل القادم تلقائياً
      - name: Trigger Next Run
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $url = "https://api.github.com/repos/$repo/dispatches"
          $headers = @{
              "Authorization" = "Bearer $env:GITHUB_TOKEN"
              "Accept"        = "application/vnd.github.v3+json"
          }
          $body = @{
              "event_type" = "rerun_rdp"
          } | ConvertTo-Json
          
          Invoke-RestMethod -Uri $url -Method Post -Headers $headers -Body $body -ContentType "application/json"
